<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사팀 인트라넷 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #ff6b35 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* 배경 장식 전용 컨테이너 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 50%;
            top: -200px;
            right: -200px;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(30, 60, 114, 0.2);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 900px;
            max-width: 100%;
            display: flex;
            position: relative;
            z-index: 1;
            margin: auto;
            
            /* 테두리 흰선 렌더링 버그 강제 해결 */
            transform: translateZ(0); 
            -webkit-transform: translateZ(0);
            -webkit-mask-image: -webkit-radial-gradient(white, black); 
        }

        .login-image {
            flex: 1;
            /* 1. 배경 이미지 배치 수정: 인물의 얼굴이 보이도록 오른쪽 중앙으로 정렬 */
            background: url('https://images.unsplash.com/photo-1573497161161-c3e73707e25c?auto=format&fit=crop&w=800&q=80'); /* 실제 사진 주소로 변경하세요 */
            background-size: cover;
            background-position: right center; /* 인물의 얼굴이 위치한 오른쪽을 기준으로 배치 */
            background-repeat: no-repeat;
            
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        /* 왼쪽 상단 꾸밈용 둥근 원 제거: 이미지가 들어가므로 깔끔하게 제거합니다. */
        /* .login-image::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 107, 53, 0.25);
            border-radius: 50%;
            top: -50px;
            right: -50px;
        } */

        /* 1. 아이콘 및 텍스트 재배치: 인물의 얼굴을 가리지 않는 하단 또는 왼쪽으로 이동 */
        .info-container {
            position: absolute;
            bottom: 40px; /* 하단에서 40px 띄우기 */
            left: 40px; /* 왼쪽에서 40px 띄우기 */
            text-align: center;
            z-index: 1;
        }

        .company-logo {
            width: 100px; /* 크기 살짝 조절 */
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px; /* 하단 여백 추가 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .company-logo svg {
            width: 60px;
            height: 60px;
        }

        .login-image h1 {
            font-size: 26px; /* 크기 살짝 조절 */
            margin-bottom: 12px;
            font-weight: 600;
            text-align: center;
            position: relative;
            z-index: 1;
            /* 2. 글씨 가독성 개선: 흰색 글씨에 미세한 검은색 그림자 추가 */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .login-image p {
            font-size: 15px; /* 크기 살짝 조절 */
            opacity: 0.9;
            text-align: center;
            line-height: 1.6;
            position: relative;
            z-index: 1;
            /* 2. 글씨 가독성 개선: 흰색 글씨에 미세한 검은색 그림자 추가 */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .login-form-wrapper {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form-wrapper h2 {
            color: #1e3c72;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-form-wrapper .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c5a 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 53, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .help-text {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 13px;
        }

        /* 레이어 팝업 스타일 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s;
            text-align: center;
        }

        .modal-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c5a 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
        }

        .modal-icon svg {
            width: 35px;
            height: 35px;
            stroke: white;
        }

        .modal-content h3 {
            color: #1e3c72;
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modal-content p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .modal-close-btn {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(30, 60, 114, 0.3);
        }

        /* 태블릿 반응형 */
        @media (max-width: 1024px) {
            .login-container {
                width: 95%;
            }

            .login-image {
                padding: 50px 30px;
            }

            .login-form-wrapper {
                padding: 50px 40px;
            }
        }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
                min-height: 100vh;
                min-height: 100dvh;
                padding-top: 30px;
                padding-bottom: 30px;
            }

            .bg-decoration::before {
                width: 300px;
                height: 300px;
                top: -100px;
                right: -100px;
            }

            .bg-decoration::after {
                width: 250px;
                height: 250px;
                bottom: -100px;
                left: -100px;
            }

            .login-container {
                flex-direction: column;
                width: 100%;
                max-width: 500px;
                margin: auto;
            }

            .login-image {
                padding: 35px 25px;
                /* 모바일에서는 배경 배치를 중앙으로 */
                background-position: center center; 
            }

            /* 모바일에서는 하단 고정 대신 컨텐츠 흐름대로 배치 */
            .info-container {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 20px;
                margin-bottom: 20px;
                padding: 0 20px;
            }

            .login-image::before {
                width: 150px;
                height: 150px;
                top: -40px;
                right: -40px;
            }

            .company-logo {
                width: 90px;
                height: 90px;
                margin-bottom: 20px;
            }

            .company-logo svg {
                width: 50px;
                height: 50px;
            }

            .login-image h1 {
                font-size: 22px;
                margin-bottom: 10px;
            }

            .login-image p {
                font-size: 14px;
            }

            .login-form-wrapper {
                padding: 35px 25px;
            }

            .login-form-wrapper h2 {
                font-size: 26px;
                margin-bottom: 8px;
            }

            .login-form-wrapper .subtitle {
                font-size: 13px;
                margin-bottom: 30px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                font-size: 13px;
                margin-bottom: 6px;
            }

            .form-group input {
                padding: 13px;
                font-size: 14px;
            }

            .login-btn {
                padding: 14px;
                font-size: 15px;
                margin-top: 5px;
            }

            .help-text {
                margin-top: 20px;
                font-size: 12px;
                line-height: 1.5;
            }

            /* 모바일 모달 스타일 */
            .modal-overlay {
                padding: 15px;
                align-items: center;
            }

            .modal-content {
                padding: 30px 25px;
                max-width: 100%;
            }

            .modal-icon {
                width: 60px;
                height: 60px;
                margin-bottom: 20px;
            }

            .modal-icon svg {
                width: 30px;
                height: 30px;
            }

            .modal-content h3 {
                font-size: 19px;
                margin-bottom: 15px;
            }

            .modal-content p {
                font-size: 14px;
                line-height: 1.7;
                margin-bottom: 25px;
            }

            .modal-close-btn {
                padding: 12px 35px;
                font-size: 14px;
                width: 100%;
            }
        }

        /* 소형 모바일 */
        @media (max-width: 480px) {
            body {
                padding: 10px;
                padding-top: 20px;
                padding-bottom: 20px;
            }

            .login-image {
                padding: 30px 20px;
            }

            .company-logo {
                width: 80px;
                height: 80px;
            }

            .company-logo svg {
                width: 45px;
                height: 45px;
            }

            .login-image h1 {
                font-size: 20px;
            }

            .login-image p {
                font-size: 13px;
            }

            .login-form-wrapper {
                padding: 30px 20px;
            }

            .login-form-wrapper h2 {
                font-size: 24px;
            }

            .login-form-wrapper .subtitle {
                font-size: 12px;
            }

            .modal-content {
                padding: 25px 20px;
            }

            .modal-content h3 {
                font-size: 17px;
            }

            .modal-content p {
                font-size: 13px;
            }
        }

        /* 가로 모드 모바일 대응 */
        @media (max-width: 768px) and (orientation: landscape) {
            body {
                align-items: center;
                padding-top: 15px;
                padding-bottom: 15px;
            }

            .login-image {
                padding: 25px 20px;
            }

            .company-logo {
                width: 70px;
                height: 70px;
                margin-bottom: 15px;
            }

            .company-logo svg {
                width: 40px;
                height: 40px;
            }

            .login-image h1 {
                font-size: 18px;
                margin-bottom: 8px;
            }

            .login-image p {
                font-size: 12px;
            }

            .login-form-wrapper {
                padding: 25px 20px;
            }

            .login-form-wrapper h2 {
                font-size: 22px;
            }

            .login-form-wrapper .subtitle {
                margin-bottom: 20px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .form-group input {
                padding: 11px;
            }

            .help-text {
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>

    <div class="login-container">
        <div class="login-image">
            <div class="info-container">
                <div class="company-logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 7H4C2.89543 7 2 7.89543 2 9V19C2 20.1046 2.89543 21 4 21H20C21.1046 21 22 20.1046 22 19V9C22 7.89543 21.1046 7 20 7Z" stroke="#2a5298" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 21V5C16 4.46957 15.7893 3.96086 15.4142 3.58579C15.0391 3.21071 14.5304 3 14 3H10C9.46957 3 8.96086 3.21071 8.58579 3.58579C8.21071 3.96086 8 4.46957 8 5V21" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1>인사팀 인트라넷</h1>
                <p>HR Management System<br>안전하고 효율적인 인사관리</p>
            </div>
        </div>
        
        <div class="login-form-wrapper">
            <h2>로그인</h2>
            <p class="subtitle">인트라넷 시스템에 오신 것을 환영합니다</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="userId">아이디</label>
                    <input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <button type="submit" class="login-btn">로그인</button>
                
                <p class="help-text">로그인에 문제가 있으신가요? 인재경영팀(내선 729)에 문의하세요.</p>
            </form>
        </div>
    </div>

    <script>
        function createModal() {
            const modalHTML = `
                <div id="modalOverlay" class="modal-overlay">
                    <div class="modal-content">
                        <div class="modal-icon">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2"/>
                                <path d="M12 8V12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                                <circle cx="12" cy="16" r="1" fill="white"/>
                            </svg>
                        </div>
                        <h3>로그인 실패</h3>
                        <p>아이디와 비밀번호를 확인하십시오.<br>아이디 생성 및 로그인 문의는<br>인재경영팀(내선 729)으로 연락바랍니다.</p>
                        <button class="modal-close-btn" onclick="closeModal()">확인</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function showModal() {
            const modal = document.getElementById('modalOverlay');
            if (modal) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal() {
            const modal = document.getElementById('modalOverlay');
            if (modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (!document.getElementById('modalOverlay')) {
                createModal();
            }
            showModal();
        });

        document.addEventListener('click', function(e) {
            const modal = document.getElementById('modalOverlay');
            if (e.target === modal) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
